[metric]
name = "pacscoreavg"
python = ">=3.9,<3.11"
module = "capevalkit.metrics.pacscore_metric"

[repository]
dir = "metrics/upstreams/pacscore"
url = "https://github.com/aimagelab/pacscore.git"
uv_project = "metrics/upstreams/pacscore"

[runner]
command = ["python", "-m", "capevalkit.metrics.pacscore_metric", "--clip-model", "open_clip_ViT-L/14", "--sentence-average"]

[checks]
smoke = ["python", "-m", "capevalkit.metrics.pacscore_metric", "--help"]

[compatibility]
merge_policy = "pacscore-vitl-sentence-average-alias"
