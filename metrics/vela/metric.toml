[metric]
name = "vela"
python = ">=3.10,<3.11"
module = "capevalkit.metrics.vela_metric"

[repository]
dir = "metrics/upstreams/vela"
url = "https://github.com/Ka2ukiMatsuda/VELA.git"
uv_project = "metrics/upstreams/vela"

[runner]
command = ["python", "-m", "capevalkit.metrics.vela_metric"]

[compatibility]
merge_policy = "single-metric-until-proven-compatible"

[checks]
smoke = ["python", "-m", "capevalkit.metrics.vela_metric", "--help"]
