[metric]
name = "jaspice"
python = ">=3.10,<3.11"
module = "capevalkit.metrics.jaspice_metric"

[repository]
dir = "metrics/upstreams/jaspice"
url = "https://github.com/keio-smilab23/JaSPICE.git"
uv_project = "metrics/upstreams/jaspice"

[runner]
command = ["python", "-m", "capevalkit.metrics.jaspice_metric"]

[checks]
smoke = ["python", "-m", "capevalkit.metrics.jaspice_metric", "--help"]

[compatibility]
merge_policy = "single-metric-until-lock-import-score-and-benchmark-pass"
